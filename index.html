<body class="bg-gray-50 font-sans antialiased">

    <script>
    (function() {
        var APP_VERSION = '20260418bf';
        var CACHE_DB = 'nutriplan_bundle_cache';
        var CACHE_STORE = 'compiled';

        // ─── IndexedDB helpers (Fase 4.3: caché de bundle compilado) ───
        function openDB() {
            return new Promise(function(resolve, reject) {
                var req = indexedDB.open(CACHE_DB, 1);
                req.onupgradeneeded = function(e) {
                    e.target.result.createObjectStore(CACHE_STORE);
                };
                req.onsuccess = function(e) { resolve(e.target.result); };
                req.onerror = function(e) { reject(e); };
            });
        }

        function getCompiledFromCache(version) {
            return openDB().then(function(db) {
                return new Promise(function(resolve) {
                    var tx = db.transaction(CACHE_STORE, 'readonly');
                    var req = tx.objectStore(CACHE_STORE).get(version);
                    req.onsuccess = function() { resolve(req.result || null); };
                    req.onerror = function() { resolve(null); };
                });
            }).catch(function() { return null; });
        }

        function saveCompiledToCache(version, compiled) {
            return openDB().then(function(db) {
                return new Promise(function(resolve) {
                    var tx = db.transaction(CACHE_STORE, 'readwrite');
                    var store = tx.objectStore(CACHE_STORE);
                    // Limpiar versiones antiguas
                    store.clear();
                    store.put(compiled, version);
                    tx.oncomplete = function() { resolve(true); };
                    tx.onerror = function() { resolve(false); };
                });
            }).catch(function() { return false; });
        }

        function checkDeps() {
            return typeof React !== 'undefined' 
                && typeof ReactDOM !== 'undefined' 
                && typeof Babel !== 'undefined'
                && typeof RECETAS_DB !== 'undefined'
                && typeof escalarReceta !== 'undefined';
        }

        function runCompiledCode(compiled) {
            var script = document.createElement('script');
            script.textContent = compiled;
            document.body.appendChild(script);
        }

        function compileAndRun() {
            var t0 = performance.now();
            // 1) Intentar usar caché compilado
            getCompiledFromCache(APP_VERSION).then(function(cached) {
                if (cached) {
                    console.log('[Bundle Cache] HIT v=' + APP_VERSION + ' · ' + Math.round(performance.now() - t0) + 'ms');
                    runCompiledCode(cached);
                    return;
                }
                console.log('[Bundle Cache] MISS v=' + APP_VERSION + ' · compilando...');
                // 2) Fetch + compile + cache
                fetch('js/app-bundle.js?v=' + APP_VERSION)
                    .then(function(res) { 
                        if (!res.ok) throw new Error('Failed to fetch app-bundle.js: ' + res.status);
                        return res.text(); 
                    })
                    .then(function(jsxCode) {
                        try {
                            var tCompile = performance.now();
                            var compiled = Babel.transform(jsxCode, { 
                                presets: ['react'],
                                filename: 'app-bundle.js'
                            }).code;
                            console.log('[Bundle Cache] Compilado en ' + Math.round(performance.now() - tCompile) + 'ms');
                            // Guardar en IndexedDB (async, no bloqueante)
                            saveCompiledToCache(APP_VERSION, compiled).then(function(ok) {
                                console.log('[Bundle Cache] Guardado: ' + (ok ? 'OK' : 'FAIL'));
                            });
                            runCompiledCode(compiled);
                        } catch(e) {
                            console.error('Babel compilation error:', e);
                            showError('Error al compilar la aplicación: ' + e.message);
                        }
                    })
                    .catch(function(e) {
                        console.error('Failed to load app:', e);
                        // Auto-recovery: si el bundle da 404, el SW está sirviendo basura.
                        // Desregistrarlo y recargar una vez.
                        if (String(e.message).indexOf('404') !== -1 && !sessionStorage.getItem('sw_cleanup_done')) {
                            sessionStorage.setItem('sw_cleanup_done', '1');
                            console.warn('[Auto-recovery] 404 detectado, limpiando SW y cachés...');
                            Promise.all([
                                navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function(rs) { return Promise.all(rs.map(function(r) { return r.unregister(); })); }) : Promise.resolve(),
                                'caches' in window ? caches.keys().then(function(ks) { return Promise.all(ks.map(function(k) { return caches.delete(k); })); }) : Promise.resolve(),
                                new Promise(function(resolve) { try { indexedDB.deleteDatabase('nutriplan_bundle_cache'); } catch(e){} resolve(); })
                            ]).finally(function() {
                                setTimeout(function() { window.location.reload(true); }, 300);
                            });
                            return;
                        }
                        showError('Error al cargar la aplicación: ' + e.message + ' (recarga la página)');
                    });
            });
        }

        function showError(msg) {
            var loader = document.getElementById('app-loader');
            if (loader) {
                loader.innerHTML = '<div style="text-align:center;padding:20px;">'
                    + '<p style="color:#ef4444;font-weight:600;margin-bottom:8px;">⚠️ ' + msg + '</p>'
                    + '<p style="font-size:14px;">Intenta recargar la página</p>'
                    + '<button onclick="location.reload(true)" style="margin-top:12px;padding:8px 24px;background:#22c55e;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:500;">Recargar</button>'
                    + '</div>';
            }
        }

        var attempts = 0;
        var maxAttempts = 150;
        var interval = setInterval(function() {
            attempts++;
            if (checkDeps()) {
                clearInterval(interval);
                compileAndRun();
            } else if (attempts >= maxAttempts) {
                clearInterval(interval);
                if (typeof Babel !== 'undefined') {
                    compileAndRun();
                } else {
                    showError('Las dependencias no se cargaron correctamente');
                }
            }
        }, 100);
    })();
    </script>

    <!-- Fase 5.2: registro de Service Worker para PWA offline -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js')
                .then(function(reg) {
                    console.log('[PWA] Service Worker registrado:', reg.scope);
                    // Forzar chequeo de actualización en cada carga
                    reg.update();
                    // Auto-activar SW nuevo y recargar una sola vez
                    var refreshing = false;
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        if (refreshing) return;
                        refreshing = true;
                        console.log('[PWA] SW nuevo activo, recargando...');
                        window.location.reload();
                    });
                    reg.addEventListener('updatefound', function() {
                        var nw = reg.installing;
                        if (!nw) return;
                        nw.addEventListener('statechange', function() {
                            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[PWA] Nueva versión lista, activando...');
                                nw.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                })
                .catch(function(err) {
                    console.warn('[PWA] Registro falló:', err);
                });
        });
    }
    </script>
</body>
